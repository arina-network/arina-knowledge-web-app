<div class="h-full w-full flex flex-col items-center justify-center gap-6">
    <h1 class="text-2xl font-semibold">Knowledge repositories</h1>
        
    <div class="prose">
        @for (group of repositories; track group.category){
            <h2 class="text-2xl font-semibold">{{group.category}}</h2>
            <ul>
                @for (item of group.repositories; track item.url){
                    <li>
                        <a routerLink="{{`/${routes.knowledge}/${item.ownerName}/${item.repositoryName}`}}"                         
                            matTooltip="{{item.url}}"
                            [matTooltipPosition]="'below'">
                            {{item.name}}
                        </a>             
                    </li>
                }            
            </ul>
        }
    </div>    
</div>
