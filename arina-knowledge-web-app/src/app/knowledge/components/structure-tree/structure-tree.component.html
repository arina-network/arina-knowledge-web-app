<app-progress [loading]="isDataLoading"></app-progress>

<mat-tree [dataSource]="dataSource" [treeControl]="treeControl" cdkDropList cdkDropListConnectedTo="sourceTextArea">

    <!-- leaf node -->
    <mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding [ngClass]="{'me-1': true, 'node-selected': selectedNode === node}" cdkDrag [cdkDragData]="node"
        matTooltip="{{node.description}}" matTooltipShowDelay="1000" (click)="selectNode(node)">
        <button mat-icon-button disabled></button>
        {{node.name}}
    </mat-tree-node>

    <!-- node with childs -->
    <mat-tree-node *matTreeNodeDef="let node; when: hasChild" matTreeNodePadding [ngClass]="{'me-1': true, 'node-selected': selectedNode === node}" cdkDrag [cdkDragData]="node"
        matTooltip="{{node.description}}" matTooltipShowDelay="1000" (click)="selectNode(node)">
        <button mat-icon-button [attr.aria-label]="'toggle ' + node.filename" matTreeNodeToggle>
            <mat-icon class="mat-icon-rtl-mirror">
                {{treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right'}}
            </mat-icon>
        </button>
        <mat-icon class="me-1">{{node.getIconName()}}</mat-icon>
        {{node.name}}&nbsp;
        @if (node.isLoading){
            <mat-progress-bar class="ms-1" mode="indeterminate"></mat-progress-bar>
        }        
    </mat-tree-node>
</mat-tree>
