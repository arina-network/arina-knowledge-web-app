<div class="max-w-4xl mx-auto p-6 bg-slate-50 min-h-screen">
  <!-- Header using Tailwind classes -->
  <header class="mb-8 text-center">
    <h1 class="text-3xl font-bold text-slate-800">GitHub Repository Manager</h1>
    <p class="text-slate-500">Track and manage your favorite projects</p>
  </header>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Form Card -->
    <mat-card class="md:col-span-1 p-6 flex flex-col gap-4 shadow-lg rounded-2xl bg-white border border-slate-200">
      <h2 class="text-xl font-semibold text-slate-800 flex items-center gap-2">
        <mat-icon class="text-indigo-600">add_circle</mat-icon> Add Repository
      </h2>
      
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Name</mat-label>
        <input matInput [(ngModel)]="newRepoName" placeholder="e.g., angular">
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Owner</mat-label>
        <input matInput [(ngModel)]="newRepoOwner" placeholder="Brief summary">
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Repository</mat-label>
        <input matInput [(ngModel)]="newRepoRepository" placeholder="e.g., TypeScript">
      </mat-form-field>

      <button mat-flat-button color="primary" class="w-full py-6 font-semibold" (click)="addRepository()">
        Add Repository
      </button>
    </mat-card>

    <!-- List Card -->
    <mat-card class="md:col-span-2 p-6 shadow-lg rounded-2xl bg-white border border-slate-200">
      <h2 class="text-xl font-semibold text-slate-800 mb-4 flex items-center gap-2">
        <mat-icon class="text-indigo-600">folder_shared</mat-icon> Repository List
      </h2>

      <mat-list *ngIf="this.repositories.length > 0; else emptyState" class="divide-y divide-slate-100">
        <mat-list-item *ngFor="let item of this.repositories" class="py-4 flex items-center justify-between hover:bg-slate-50 rounded-lg transition-colors duration-200">
          
          <div class="flex flex-col flex-1 cursor-pointer">
            <div class="flex items-center gap-3">
              <span class="font-bold text-slate-800 text-lg">{{ item.name }}</span>
              <!-- <span class="bg-indigo-50 text-indigo-700 text-xs font-medium px-2.5 py-0.5 rounded-full border border-indigo-100">{{ repo.language }}</span> -->
            </div>
            <p class="text-slate-500 text-sm mt-1">{{ item.ownerName }}</p>
            <p class="text-slate-500 text-sm mt-1">{{ item.repositoryName }}</p>
          </div>

          <div class="flex items-center gap-4 ml-4">
            <!-- <div class="flex items-center text-amber-500 font-semibold gap-1">
              <mat-icon class="text-amber-500 text-base">star</mat-icon>
              <span>{{ repo.stars }}</span>
            </div> -->
            
            <button mat-icon-button color="warn" (click)="deleteRepository(item.key); $event.stopPropagation()">
              <mat-icon>delete</mat-icon>
            </button>
          </div>

        </mat-list-item>
      </mat-list>

      <ng-template #emptyState>
        <div class="flex flex-col items-center justify-center py-20 text-slate-400">
          <mat-icon class="text-6xl mb-4 h-16 w-16">folder_open</mat-icon>
          <p class="text-lg font-medium">No repositories tracked yet</p>
        </div>
      </ng-template>
    </mat-card>
  </div>
</div>
